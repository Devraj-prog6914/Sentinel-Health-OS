version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: sentinel_postgres
    environment:
      POSTGRES_USER: sentinel_user
      POSTGRES_PASSWORD: SentinelSecurePassword2026!
      POSTGRES_DB: sentinel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    environment:
      - PROJECT_NAME=Sentinel Health Operating System
      - DATABASE_URL=postgresql://sentinel_user:SentinelSecurePassword2026!@postgres:5432/sentinel_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=SUPER_SECRET_SECURITY_KEY_SENTINEL_HEALTH_OS_2026
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_worker
    command: celery -A app.core.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://sentinel_user:SentinelSecurePassword2026!@postgres:5432/sentinel_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
